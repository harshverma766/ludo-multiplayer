<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Online — Play with Friends</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --red: #D94F3D;
  --blue: #3A7DC9;
  --green: #3D9A5C;
  --yellow: #D4A017;
  --red-l: #FDECEA;
  --blue-l: #E8F0FB;
  --green-l: #E8F5ED;
  --yellow-l: #FDF8E3;
  --bg: #F7F4EE;
  --surface: #FFFFFF;
  --border: #E2DDD4;
  --text: #1C1917;
  --muted: #78716C;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
h1, h2, .logo { font-family: 'Playfair Display', serif; }

/* ── Screens ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; }

/* ── Lobby ── */
#screen-lobby {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 2rem;
}
.logo-area { text-align: center; }
.logo { font-size: 3rem; color: var(--text); letter-spacing: -1px; }
.logo span { color: var(--red); }
.tagline { font-size: 1rem; color: var(--muted); margin-top: 4px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.75rem;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow);
}
.card h2 { font-size: 1.3rem; margin-bottom: 1.25rem; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.field input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.95rem;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus { border-color: var(--text); }
.btn {
  width: 100%;
  padding: 11px 20px;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--text); color: #fff; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); margin-top: 8px; }
.btn-secondary:hover { background: var(--border); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.divider { text-align: center; color: var(--muted); font-size: 0.85rem; margin: 1rem 0; }
.error-msg { color: var(--red); font-size: 0.85rem; margin-top: 8px; min-height: 20px; }

/* ── Waiting Room ── */
#screen-waiting {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 1.5rem;
}
.room-code-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  text-align: center;
  width: 100%;
  max-width: 440px;
}
.room-code-box .label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.room-code { font-family: 'Playfair Display', serif; font-size: 3rem; letter-spacing: 0.15em; color: var(--text); margin: 4px 0; }
.copy-btn {
  padding: 6px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  cursor: pointer;
  font-size: 0.8rem;
  font-family: 'DM Sans', sans-serif;
}
.copy-btn:hover { background: var(--border); }
.players-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 440px;
}
.player-slot {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.player-slot.empty { opacity: 0.45; }
.player-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.95rem; color: #fff;
  flex-shrink: 0;
}
.player-slot-name { font-size: 0.9rem; font-weight: 500; }
.player-slot-sub { font-size: 0.75rem; color: var(--muted); }
.color-picker {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 440px;
  flex-wrap: wrap;
}
.color-opt {
  flex: 1;
  min-width: 80px;
  padding: 10px;
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  text-align: center;
  font-size: 0.8rem;
  font-weight: 600;
  transition: all 0.15s;
  user-select: none;
}
.color-opt.taken { opacity: 0.35; cursor: not-allowed; }
.color-opt.selected { border-color: var(--text) !important; }
.color-opt[data-color="red"] { background: var(--red-l); color: var(--red); }
.color-opt[data-color="blue"] { background: var(--blue-l); color: var(--blue); }
.color-opt[data-color="green"] { background: var(--green-l); color: var(--green); }
.color-opt[data-color="yellow"] { background: var(--yellow-l); color: var(--yellow); }

/* ── Game Screen ── */
#screen-game {
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 0.75rem;
  gap: 0.75rem;
}
.game-header {
  display: flex;
  width: 100%;
  max-width: 900px;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.game-logo { font-size: 1.4rem; font-family: 'Playfair Display', serif; }
.game-logo span { color: var(--red); }
.players-row { display: flex; gap: 8px; flex-wrap: wrap; }
.player-tag {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 500;
  border: 1.5px solid transparent;
  transition: all 0.2s;
}
.player-tag.current { border-color: currentColor; font-weight: 700; }
.player-tag.winner { background: #FFF9C4; border-color: var(--yellow); }
.dot { width: 8px; height: 8px; border-radius: 50%; }

.game-body {
  display: flex;
  gap: 1rem;
  width: 100%;
  max-width: 900px;
  align-items: flex-start;
  flex-wrap: wrap;
  justify-content: center;
}
#board-canvas {
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-width: 100%;
}
.game-sidebar {
  flex: 1;
  min-width: 200px;
  max-width: 240px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.sidebar-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.sidebar-card h3 {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 10px;
}
.dice-area { text-align: center; }
.dice-face {
  font-size: 3.5rem;
  line-height: 1;
  display: block;
  margin: 4px 0 12px;
  transition: transform 0.1s;
}
.dice-face.rolling { animation: diceRoll 0.5s ease; }
@keyframes diceRoll {
  0%,100%{transform:rotate(0deg) scale(1)}
  25%{transform:rotate(-15deg) scale(1.1)}
  50%{transform:rotate(10deg) scale(0.9)}
  75%{transform:rotate(-5deg) scale(1.05)}
}
.btn-roll {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 0.9rem;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  color: #fff;
}
.btn-roll:disabled { opacity: 0.4; cursor: not-allowed; }
.pawn-list { display: flex; flex-direction: column; gap: 6px; }
.pawn-btn {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1.5px solid transparent;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.pawn-btn:hover { opacity: 0.8; transform: translateX(2px); }
.log-list { max-height: 180px; overflow-y: auto; }
.log-entry {
  font-size: 0.78rem;
  color: var(--muted);
  padding: 3px 0;
  border-bottom: 1px solid var(--border);
}
.log-entry:first-child { color: var(--text); font-weight: 500; }

/* ── Winner overlay ── */
#winner-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(28,25,23,0.6);
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#winner-modal.show { display: flex; }
.winner-box {
  background: var(--surface);
  border-radius: 20px;
  padding: 2.5rem;
  text-align: center;
  max-width: 320px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
.winner-emoji { font-size: 3rem; margin-bottom: 8px; }
.winner-box h2 { font-size: 1.8rem; margin-bottom: 8px; }
.winner-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }

/* ── Status bar ── */
.status-bar {
  width: 100%;
  max-width: 900px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 0.85rem;
  color: var(--muted);
  text-align: center;
}
.turn-indicator { font-weight: 600; }

/* responsive */
@media (max-width: 620px) {
  .game-sidebar { max-width: 100%; width: 100%; flex-direction: row; flex-wrap: wrap; }
  .sidebar-card { flex: 1; min-width: 150px; }
}
</style>
</head>
<body>

<!-- ── Lobby ── -->
<div id="screen-lobby" class="screen active">
  <div class="logo-area">
    <div class="logo">Lu<span>d</span>o</div>
    <div class="tagline">Play with friends online — anywhere, anytime</div>
  </div>
  <div class="card">
    <h2>Join the Board</h2>
    <div class="field">
      <label>Your Name</label>
      <input id="player-name" type="text" placeholder="Enter your name" maxlength="16" autocomplete="off">
    </div>
    <button class="btn btn-primary" id="btn-create">Create New Room</button>
    <div class="divider">— or —</div>
    <div class="field">
      <label>Room Code</label>
      <input id="join-code" type="text" placeholder="e.g. AB3XZ" maxlength="5" style="text-transform:uppercase;letter-spacing:0.1em">
    </div>
    <button class="btn btn-secondary" id="btn-join">Join Room</button>
    <div class="error-msg" id="lobby-error"></div>
  </div>
</div>

<!-- ── Waiting Room ── -->
<div id="screen-waiting" class="screen">
  <div class="room-code-box">
    <div class="label">Room Code — share with friends</div>
    <div class="room-code" id="display-code">—</div>
    <button class="copy-btn" id="btn-copy-code">Copy Code</button>
  </div>

  <div class="players-grid" id="waiting-players"></div>

  <div style="width:100%;max-width:440px">
    <div style="font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:8px">Pick Your Color</div>
    <div class="color-picker" id="color-picker">
      <div class="color-opt" data-color="red">Red</div>
      <div class="color-opt" data-color="blue">Blue</div>
      <div class="color-opt" data-color="green">Green</div>
      <div class="color-opt" data-color="yellow">Yellow</div>
    </div>
  </div>

  <div style="width:100%;max-width:440px;display:flex;flex-direction:column;gap:8px">
    <button class="btn btn-primary" id="btn-start" disabled>Start Game (host only)</button>
    <button class="btn btn-secondary" id="btn-leave">Leave Room</button>
    <div class="error-msg" id="waiting-error"></div>
  </div>
</div>

<!-- ── Game ── -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="game-logo">Lu<span>d</span>o Online</div>
    <div class="players-row" id="players-row"></div>
  </div>
  <div class="status-bar"><span class="turn-indicator" id="turn-text">Waiting…</span></div>
  <div class="game-body">
    <canvas id="board-canvas" width="510" height="510"></canvas>
    <div class="game-sidebar">
      <div class="sidebar-card dice-area">
        <h3>Dice</h3>
        <span class="dice-face" id="dice-face">⚀</span>
        <button class="btn-roll" id="btn-roll" disabled>Roll</button>
      </div>
      <div class="sidebar-card" id="pawn-area" style="display:none">
        <h3>Move a Pawn</h3>
        <div class="pawn-list" id="pawn-list"></div>
      </div>
      <div class="sidebar-card">
        <h3>Game Log</h3>
        <div class="log-list" id="log-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Winner -->
<div id="winner-modal">
  <div class="winner-box">
    <div class="winner-emoji">🏆</div>
    <h2 id="winner-name">Red Wins!</h2>
    <p>Congratulations — all 4 pawns home!</p>
    <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────────────────────────────────────
const COLORS = { red:'#D94F3D', blue:'#3A7DC9', green:'#3D9A5C', yellow:'#D4A017' };
const COLORS_LIGHT = { red:'#FDECEA', blue:'#E8F0FB', green:'#E8F5ED', yellow:'#FDF8E3' };
const DICE_FACES = ['','⚀','⚁','⚂','⚃','⚄','⚅'];

const START_IDX = { red:0, blue:13, green:26, yellow:39 };
const HOME_COLS = {
  red:    [[6,13],[6,12],[6,11],[6,10],[6,9]],
  blue:   [[1,6],[2,6],[3,6],[4,6],[5,6]],
  green:  [[8,1],[8,2],[8,3],[8,4],[8,5]],
  yellow: [[13,8],[12,8],[11,8],[10,8],[9,8]],
};
const SAFE_SET = new Set([0,8,13,21,26,34,39,47]);

function buildPath() {
  const p = [];
  for (let r=14;r>=9;r--) p.push([6,r]);
  for (let c=5;c>=0;c--) p.push([c,8]);
  for (let r=7;r>=6;r--) p.push([0,r]);
  for (let c=1;c<=5;c++) p.push([c,6]);
  for (let r=5;r>=0;r--) p.push([6,r]);
  for (let c=7;c<=8;c++) p.push([c,0]);
  for (let r=1;r<=5;r++) p.push([8,r]);
  for (let c=9;c<=14;c++) p.push([c,6]);
  for (let r=7;r<=8;r++) p.push([14,r]);
  for (let c=13;c>=9;c--) p.push([c,8]);
  for (let r=9;r<=14;r++) p.push([8,r]);
  return p;
}
const PATH = buildPath();

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let socket;
let myId = null;
let myColor = null;
let roomData = null;
let gameState = null;

// ─────────────────────────────────────────────────────────────────────────────
// Socket setup
// ─────────────────────────────────────────────────────────────────────────────
function connectSocket() {
  const serverUrl = window.location.origin;
  socket = io(serverUrl, {
    transports: ['polling', 'websocket'],
    reconnection: true,
    reconnectionAttempts: 5,
    reconnectionDelay: 1000,
  });
  myId = null;

  socket.on('connect', () => { myId = socket.id; console.log('Connected:', myId); });

  socket.on('connect_error', (err) => {
    console.error('Connection error:', err.message);
    document.getElementById('lobby-error').textContent = 'Connection failed: ' + err.message;
  });

  socket.on('room_update', data => {
    roomData = data;
    renderWaiting();
  });

  socket.on('game_start', data => {
    roomData = data;
    gameState = data.state;
    showScreen('game');
    renderGame();
  });

  socket.on('state_update', data => {
    roomData = data;
    gameState = data.state;
    renderGame();
    if (gameState.winner) showWinner(gameState.winner);
  });

  socket.on('error_msg', msg => {
    document.getElementById('lobby-error').textContent = msg;
    document.getElementById('waiting-error').textContent = msg;
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Lobby actions
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('btn-create').onclick = () => {
  const name = document.getElementById('player-name').value.trim();
  if (!name) { document.getElementById('lobby-error').textContent = 'Enter your name.'; return; }
  if (!socket) connectSocket();
  socket.emit('create_room', { name }, res => {
    if (!res.ok) { document.getElementById('lobby-error').textContent = res.error; return; }
    document.getElementById('display-code').textContent = res.code;
    document.getElementById('btn-start').style.display = '';
    showScreen('waiting');
  });
};

document.getElementById('btn-join').onclick = () => {
  const name = document.getElementById('player-name').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!name) { document.getElementById('lobby-error').textContent = 'Enter your name.'; return; }
  if (!code) { document.getElementById('lobby-error').textContent = 'Enter a room code.'; return; }
  if (!socket) connectSocket();
  socket.emit('join_room', { code, name }, res => {
    if (!res.ok) { document.getElementById('lobby-error').textContent = res.error; return; }
    document.getElementById('display-code').textContent = res.code;
    document.getElementById('btn-start').style.display = 'none';
    showScreen('waiting');
  });
};

document.getElementById('btn-copy-code').onclick = () => {
  const code = document.getElementById('display-code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    document.getElementById('btn-copy-code').textContent = 'Copied!';
    setTimeout(() => document.getElementById('btn-copy-code').textContent = 'Copy Code', 1500);
  });
};

document.getElementById('btn-leave').onclick = () => {
  socket && socket.disconnect();
  socket = null;
  showScreen('lobby');
};

document.getElementById('btn-start').onclick = () => {
  document.getElementById('waiting-error').textContent = '';
  socket.emit('start_game');
};

// Color picker
document.querySelectorAll('.color-opt').forEach(el => {
  el.onclick = () => {
    if (el.classList.contains('taken')) return;
    socket.emit('pick_color', { color: el.dataset.color });
  };
});

// ─────────────────────────────────────────────────────────────────────────────
// Waiting room render
// ─────────────────────────────────────────────────────────────────────────────
function renderWaiting() {
  if (!roomData) return;
  const { players, host } = roomData;
  const me = players.find(p => p.id === myId);
  myColor = me?.color || null;

  // Player slots
  const grid = document.getElementById('waiting-players');
  grid.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const pl = players[i];
    const slot = document.createElement('div');
    slot.className = 'player-slot' + (pl ? '' : ' empty');
    if (pl) {
      const col = pl.color ? COLORS[pl.color] : '#888';
      slot.innerHTML = `
        <div class="player-avatar" style="background:${col}">${pl.name[0].toUpperCase()}</div>
        <div>
          <div class="player-slot-name">${esc(pl.name)}${pl.id===host?' 👑':''}</div>
          <div class="player-slot-sub">${pl.color ? pl.color : 'No color'}</div>
        </div>`;
    } else {
      slot.innerHTML = `<div class="player-avatar" style="background:#ccc">?</div><div><div class="player-slot-name">Waiting…</div></div>`;
    }
    grid.appendChild(slot);
  }

  // Color picker — mark taken
  const takenColors = players.filter(p=>p.id!==myId).map(p=>p.color);
  document.querySelectorAll('.color-opt').forEach(el => {
    el.classList.toggle('taken', takenColors.includes(el.dataset.color));
    el.classList.toggle('selected', el.dataset.color === myColor);
  });

  // Start button
  const isHost = myId === host;
  const startBtn = document.getElementById('btn-start');
  startBtn.style.display = isHost ? '' : 'none';
  startBtn.disabled = players.length < 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// Board drawing
// ─────────────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('board-canvas');
const ctx = canvas.getContext('2d');
const S = 510, CELLS = 15, CS = S/CELLS;

function drawBoard() {
  const c = ctx;
  c.clearRect(0,0,S,S);

  c.fillStyle = '#F7F4EE';
  c.fillRect(0,0,S,S);

  // grid
  c.strokeStyle = '#ddd';
  c.lineWidth = 0.5;
  for (let i=0;i<=CELLS;i++) {
    c.beginPath(); c.moveTo(i*CS,0); c.lineTo(i*CS,S); c.stroke();
    c.beginPath(); c.moveTo(0,i*CS); c.lineTo(S,i*CS); c.stroke();
  }

  // Color quadrants
  drawZone(c,0,0,6,6,'red');
  drawZone(c,9,0,6,6,'blue');
  drawZone(c,9,9,6,6,'green');
  drawZone(c,0,9,6,6,'yellow');

  // Center triangles
  drawCenter(c);

  // Home column highlights
  for(let r=9;r<=13;r++) fillCell(c,6,r,COLORS['red']+'28');
  for(let col=1;col<=5;col++) fillCell(c,col,6,COLORS['blue']+'28');
  for(let r=1;r<=5;r++) fillCell(c,8,r,COLORS['green']+'28');
  for(let col=9;col<=13;col++) fillCell(c,col,8,COLORS['yellow']+'28');

  // Safe star cells
  SAFE_SET.forEach(idx => {
    const [col,row] = PATH[idx];
    drawStar(c, col*CS+CS/2, row*CS+CS/2, CS*0.28, '#FBBF24');
  });

  // Start arrows
  const arrows = [[6,14,'up','red'],[0,6,'right','blue'],[8,0,'down','green'],[14,8,'left','yellow']];
  arrows.forEach(([col,row,dir,color]) => {
    c.fillStyle = COLORS[color];
    drawArrow(c, col*CS+CS/2, row*CS+CS/2, dir, CS*0.3);
  });

  if (!gameState) return;

  // Pawns
  gameState.players.forEach(pl => {
    gameState.pawns[pl.color].forEach((pawn,pi) => {
      drawPawn(c, pl.color, pi, pawn.pos);
    });
  });
}

function fillCell(c,col,row,color) {
  c.fillStyle = color;
  c.fillRect(col*CS+1, row*CS+1, CS-2, CS-2);
}

function drawZone(c, sc, sr, w, h, color) {
  c.fillStyle = COLORS_LIGHT[color];
  c.fillRect(sc*CS, sr*CS, w*CS, h*CS);
  c.strokeStyle = COLORS[color];
  c.lineWidth = 2.5;
  c.strokeRect(sc*CS+1, sr*CS+1, w*CS-2, h*CS-2);
  // inner circle
  const cx = (sc+w/2)*CS, cy = (sr+h/2)*CS;
  c.fillStyle = COLORS[color]+'20';
  c.beginPath(); c.arc(cx,cy,CS*1.7,0,Math.PI*2); c.fill();
  // base pawn spots
  const offsets=[[0,0],[1,0],[0,1],[1,1]];
  offsets.forEach(([ox,oy]) => {
    const px=(sc+1+ox*1.4)*CS+CS*0.3, py=(sr+1+oy*1.4)*CS+CS*0.3;
    c.fillStyle = COLORS[color]+'55';
    c.beginPath(); c.arc(px, py, CS*0.32, 0, Math.PI*2); c.fill();
    c.strokeStyle = COLORS[color];
    c.lineWidth = 1;
    c.stroke();
  });
}

function drawCenter(c) {
  const x=6*CS, y=6*CS, sz=3*CS, mid=x+sz/2, midy=y+sz/2;
  const colorArr=['red','blue','green','yellow'];
  [[x,y,x+sz,y,mid,midy],[x+sz,y,x+sz,y+sz,mid,midy],
   [x+sz,y+sz,x,y+sz,mid,midy],[x,y+sz,x,y,mid,midy]].forEach(([x1,y1,x2,y2,x3,y3],i)=>{
    c.fillStyle=COLORS[colorArr[i]];
    c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.lineTo(x3,y3); c.closePath(); c.fill();
  });
}

function drawStar(c,x,y,r,color) {
  c.fillStyle=color;
  c.beginPath();
  for(let i=0;i<5;i++){
    const a=(i*4*Math.PI/5)-Math.PI/2, b=(i*4*Math.PI/5+2*Math.PI/5)-Math.PI/2;
    c.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    c.lineTo(x+Math.cos(b)*r*0.4, y+Math.sin(b)*r*0.4);
  }
  c.closePath(); c.fill();
}

function drawArrow(c,x,y,dir,sz) {
  const angle={up:0,right:Math.PI/2,down:Math.PI,left:-Math.PI/2}[dir];
  c.save(); c.translate(x,y); c.rotate(angle);
  c.beginPath(); c.moveTo(0,-sz); c.lineTo(sz*0.6,sz*0.3); c.lineTo(0,0); c.lineTo(-sz*0.6,sz*0.3); c.closePath(); c.fill();
  c.restore();
}

function getPawnCell(color, pos) {
  if (pos < 0) return null;
  if (pos >= 57) return null;
  if (pos >= 52) {
    const idx = pos-52;
    return HOME_COLS[color][idx] || null;
  }
  const absIdx = (START_IDX[color]+pos)%52;
  return PATH[absIdx];
}

function getPawnHomeXY(color, pawnIdx) {
  const bases={red:[1.5,1.5],blue:[9.5,1.5],green:[9.5,9.5],yellow:[1.5,9.5]};
  const [bx,by]=bases[color];
  const ox=[0,1,0,1][pawnIdx], oy=[0,0,1,1][pawnIdx];
  return [(bx+ox*1.4)*CS+CS*0.3, (by+oy*1.4)*CS+CS*0.3];
}

function drawPawn(c, color, pawnIdx, pos) {
  let x, y;
  if (pos<0) { [x,y]=getPawnHomeXY(color,pawnIdx); }
  else if (pos>=57) return;
  else {
    const cell = getPawnCell(color, pos);
    if (!cell) return;
    x=cell[0]*CS+CS/2; y=cell[1]*CS+CS/2;
    // stack offset
    let stack=0;
    if (gameState) {
      gameState.pawns[color].forEach((pp,pi)=>{
        if(pi<pawnIdx && pp.pos===pos) stack++;
      });
    }
    x+=stack*CS*0.15; y-=stack*CS*0.15;
  }
  const r=CS*0.28;
  // Shadow
  c.fillStyle='rgba(0,0,0,0.12)';
  c.beginPath(); c.ellipse(x+1, y+r*0.8+1, r*0.55, r*0.2, 0, 0, Math.PI*2); c.fill();
  // Body
  c.fillStyle=COLORS[color];
  c.strokeStyle='#fff';
  c.lineWidth=1.5;
  c.beginPath(); c.arc(x, y-r*0.25, r*0.55, 0, Math.PI*2); c.fill(); c.stroke();
  c.beginPath(); c.moveTo(x,y+r*0.2); c.lineTo(x,y-r*0.25+r*0.55); c.stroke();
  c.beginPath(); c.arc(x, y+r*0.5, r*0.32, 0, Math.PI*2); c.fill(); c.stroke();
  // Number
  c.fillStyle='#fff';
  c.font=`bold ${Math.round(CS*0.2)}px DM Sans, sans-serif`;
  c.textAlign='center'; c.textBaseline='middle';
  c.fillText(pawnIdx+1, x, y-r*0.25);
}

// ─────────────────────────────────────────────────────────────────────────────
// Game UI render
// ─────────────────────────────────────────────────────────────────────────────
function renderGame() {
  if (!gameState) return;
  const gs = gameState;
  const current = gs.players[gs.currentIdx];
  const isMyTurn = current && current.id === myId;

  // Players row
  const row = document.getElementById('players-row');
  row.innerHTML = '';
  gs.players.forEach((pl, i) => {
    const tag = document.createElement('div');
    tag.className = 'player-tag' + (i===gs.currentIdx ? ' current' : '') + (gs.winner===pl.color ? ' winner' : '');
    tag.style.color = COLORS[pl.color];
    tag.innerHTML = `<div class="dot" style="background:${COLORS[pl.color]}"></div>${esc(pl.name)}`;
    row.appendChild(tag);
  });

  // Turn text
  const turnEl = document.getElementById('turn-text');
  if (gs.winner) {
    const winner = gs.players.find(p=>p.color===gs.winner);
    turnEl.textContent = `🏆 ${winner?.name||'Someone'} wins!`;
  } else {
    turnEl.textContent = isMyTurn ? `Your turn (${myColor})` : `${current?.name}'s turn`;
    turnEl.style.color = current ? COLORS[current.color] : '';
  }

  // Dice
  const rollBtn = document.getElementById('btn-roll');
  const diceFace = document.getElementById('dice-face');
  rollBtn.disabled = !isMyTurn || gs.phase !== 'roll' || !!gs.winner;
  rollBtn.style.background = isMyTurn && gs.phase==='roll' && !gs.winner ? COLORS[current?.color]||'#333' : '#ccc';
  if (gs.dice) diceFace.textContent = DICE_FACES[gs.dice];

  // Pawn buttons
  const pawnArea = document.getElementById('pawn-area');
  const pawnList = document.getElementById('pawn-list');
  if (isMyTurn && gs.phase==='move' && gs.dice && myColor) {
    const movable = getMovablePawns(gs, myColor, gs.dice);
    if (movable.length > 0) {
      pawnArea.style.display = '';
      pawnList.innerHTML = '';
      movable.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'pawn-btn';
        btn.style.background = COLORS_LIGHT[myColor];
        btn.style.borderColor = COLORS[myColor];
        btn.style.color = COLORS[myColor];
        const posLabel = p.pos<0 ? 'Base' : p.pos>=52 ? 'Home col' : `Pos ${p.pos}`;
        btn.innerHTML = `<span>●</span> Pawn ${p.id+1} <small style="opacity:0.7">(${posLabel})</small>`;
        btn.onclick = () => socket.emit('move_pawn', { pawnId: p.id });
        pawnList.appendChild(btn);
      });
    } else {
      pawnArea.style.display = 'none';
    }
  } else {
    pawnArea.style.display = 'none';
  }

  // Log
  const logEl = document.getElementById('log-list');
  logEl.innerHTML = '';
  (gs.log||[]).forEach(entry => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.textContent = entry.text;
    logEl.appendChild(div);
  });

  drawBoard();
}

function getMovablePawns(gs, color, dice) {
  return (gs.pawns[color]||[]).filter(p => {
    if (p.pos===-1 && dice===6) return true;
    if (p.pos===-1) return false;
    if (p.pos>=57) return false;
    if (p.pos+dice>56) return false;
    return true;
  });
}

// Roll dice
document.getElementById('btn-roll').onclick = () => {
  const diceFace = document.getElementById('dice-face');
  diceFace.classList.add('rolling');
  setTimeout(()=>diceFace.classList.remove('rolling'), 500);
  socket.emit('roll_dice');
};

function showWinner(color) {
  const winner = gameState?.players.find(p=>p.color===color);
  document.getElementById('winner-name').textContent = `${winner?.name||'Someone'} Wins!`;
  document.getElementById('winner-name').style.color = COLORS[color]||'#333';
  document.getElementById('winner-modal').classList.add('show');
}

// ─────────────────────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if (name==='game') drawBoard();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Initial board draw
drawBoard();
</script>
